<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reforço Acadêmico Engenharia</title>
<link rel="icon" href="logo.png" type="image/png">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
  import { getFirestore } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
  import { getAuth } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyBaSxQGsFGXMc0IwZCLNT3PRNhwfW0woxg",
    authDomain: "reforcoacademicoufcg.firebaseapp.com",
    projectId: "reforcoacademicoufcg",
    storageBucket: "reforcoacademicoufcg.firebasestorage.app",
    messagingSenderId: "753603407071",
    appId: "1:753603407071:web:97ed12b315375b04e94d6a",
    measurementId: "G-80SS8D7RL9"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // Make db and auth global for other modules
  window.db = db;
  window.auth = auth;
</script>
</head>

<body class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen font-sans">
<div class="max-w-6xl mx-auto p-4 md:p-6">

  <!-- LOGIN / CRIAR USUÁRIO -->
  <div id="loginCard" class="bg-white rounded-2xl shadow-2xl p-8 mt-8 max-w-md mx-auto border border-gray-200 animate-fade-in">
    <div class="text-center mb-6">
      <i class="fas fa-bolt text-4xl text-raio mb-2"></i>
      <h1 class="text-3xl font-bold text-ufcg mb-2">Reforço Acadêmico</h1>
      <p class="text-gray-600">Engenharia Elétrica • UFCG</p>
    </div>

    <div class="space-y-4">
      <!-- Campos para login -->
      <div id="loginFields">
        <input id="username" name="username" type="text" autocomplete="username" placeholder="Nome de usuário" class="w-full p-4 rounded-xl border-2 border-gray-200 focus:border-raio focus:outline-none transition-colors">
      </div>

      <!-- Campo adicional para criar conta -->
      <div id="createFields" class="hidden">
        <input id="displayName" name="displayName" type="text" autocomplete="name" placeholder="Nome de usuário" oninput="verificarNomeUsuario()" class="w-full p-4 rounded-xl border-2 border-gray-200 focus:border-raio focus:outline-none transition-colors">
        <div id="usernameStatus" class="text-sm mt-1 hidden"></div>
        <input id="userEmail" name="userEmail" type="email" autocomplete="email" placeholder="Email" class="w-full p-4 rounded-xl border-2 border-gray-200 focus:border-raio focus:outline-none transition-colors">
      </div>

      <!-- Campo de senha compartilhado -->
      <div id="passwordField">
        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Senha" class="w-full p-4 rounded-xl border-2 border-gray-200 focus:border-raio focus:outline-none transition-colors">
      </div>
      <div id="confirmPasswordField" class="hidden">
        <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" placeholder="Confirmar senha" class="w-full p-4 rounded-xl border-2 border-gray-200 focus:border-raio focus:outline-none transition-colors">
      </div>
    </div>

    <div class="mt-6 space-y-3">
      <button onclick="if(window.loginUsuario) window.loginUsuario(); else alert('Sistema ainda carregando...')" class="w-full bg-ufcg hover:bg-ufcg-dark text-white p-4 rounded-xl font-semibold transition-all transform hover:scale-105 shadow-lg">
        <i class="fas fa-sign-in-alt mr-2"></i>Entrar
      </button>
      <button onclick="if(window.mostrarCriarConta) window.mostrarCriarConta(); else alert('Sistema ainda carregando...')" class="w-full bg-raio hover:bg-yellow-400 text-black p-4 rounded-xl font-semibold transition-all transform hover:scale-105 shadow-lg">
        <i class="fas fa-user-plus mr-2"></i>Criar Usuário
      </button>
      <button id="btnVoltarLogin" onclick="if(window.mostrarLogin) window.mostrarLogin(); else alert('Sistema ainda carregando...')" class="hidden w-full bg-gray-500 hover:bg-gray-600 text-white p-4 rounded-xl font-semibold transition-all transform hover:scale-105 shadow-lg">
        <i class="fas fa-arrow-left mr-2"></i>Voltar ao Login
      </button>
    </div>
    <p id="loginMsg" class="text-center text-red-500 mt-4 font-medium"></p>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="hidden space-y-6 animate-slide-up">

    <!-- HEADER -->
    <div class="bg-ufcg text-white rounded-2xl p-6 shadow-2xl flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-lg">
          <i class="fas fa-graduation-cap text-2xl text-ufcg"></i>
        </div>
        <div>
          <h1 class="text-2xl font-bold">Reforço Acadêmico</h1>
          <p class="text-sm opacity-90">Engenharia Elétrica • UFCG</p>
        </div>
      </div>
      <div class="text-right">
        <p id="usuarioAtivo" class="font-bold text-lg"></p>
        <button onclick="if(window.logout) window.logout(); else alert('Sistema ainda carregando...')" class="text-white/80 hover:text-white text-sm underline transition-colors">
          <i class="fas fa-sign-out-alt mr-1"></i>Sair
        </button>
      </div>
    </div>

    <!-- RANKING E STREAK -->
    <div class="bg-white rounded-2xl shadow-xl p-6 border border-gray-100">
      <div class="flex justify-between items-center flex-wrap gap-6">
        <div class="flex-1 min-w-[250px]">
          <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
            <i class="fas fa-calendar-alt text-raio mr-2"></i>Metas de Estudo 2026
          </h2>
          <div class="flex gap-3 mb-4">
            <select id="metaDiaria" class="border-2 border-gray-200 p-3 rounded-xl w-full focus:border-raio focus:outline-none transition-colors bg-white">
              <option value="3">3 questões/dia (Leve)</option>
              <option value="5" selected>5 questões/dia (Moderado)</option>
              <option value="7">7 questões/dia (Intenso)</option>
              <option value="10">10 questões/dia (Extremo)</option>
            </select>
            <button onclick="if(window.salvarMeta) window.salvarMeta(); else alert('Sistema ainda carregando...')" class="bg-ufcg hover:bg-ufcg-dark text-white px-6 rounded-xl font-semibold transition-all transform hover:scale-105 shadow-lg">
              <i class="fas fa-save mr-1"></i>Definir Meta
            </button>
          </div>
          <p id="metaAtual" class="text-gray-600 mb-4 italic text-sm"></p>
          <div id="calendario2026" class="grid grid-cols-7 gap-2 text-center text-sm bg-gray-50 p-4 rounded-xl"></div>
        </div>
        <div class="flex-1 min-w-[200px] space-y-4">
          <div class="bg-gradient-to-r from-raio to-yellow-300 p-4 rounded-xl text-center shadow-lg">
            <h3 class="font-bold text-gray-800 text-lg">XP Total</h3>
            <p id="xpUsuario" class="text-3xl font-bold text-ufcg">0</p>
          </div>
          <div class="bg-gradient-to-r from-orange-400 to-red-400 p-4 rounded-xl text-center shadow-lg">
            <h3 class="font-bold text-white text-lg">Sequência de dias</h3>
            <p id="streakUsuario" class="text-3xl font-bold text-white">0 <i class="fas fa-fire ml-1"></i></p>
          </div>
          <div class="bg-white p-4 rounded-xl shadow-lg border border-gray-200">
            <h3 class="font-bold text-gray-800 mb-2 flex items-center">
              <i class="fas fa-trophy text-raio mr-2"></i>Ranking Histórico
            </h3>
            <div id="rankingHistorico" class="space-y-2"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- MENU DISCIPLINAS -->
    <div id="menuCard" class="bg-white rounded-2xl shadow-xl p-6 border border-gray-100">
      <h2 class="text-xl font-bold mb-6 text-gray-800 flex items-center">
        <i class="fas fa-book text-raio mr-2"></i>Escolha a disciplina
      </h2>
      <div id="disciplinasContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

    <!-- ASSUNTOS -->
    <div id="assuntosCard" class="hidden bg-white rounded-2xl shadow-xl p-6 border border-gray-100 animate-slide-up">
      <div class="flex items-center justify-between mb-4">
        <h2 id="disciplinaTitulo" class="text-2xl font-bold text-ufcg flex items-center">
          <i class="fas fa-list-ul text-raio mr-2"></i>
        </h2>
        <button onclick="if(window.voltarMenu) window.voltarMenu(); else alert('Sistema ainda carregando...')" class="bg-gray-100 hover:bg-gray-200 p-3 rounded-xl transition-colors">
          <i class="fas fa-arrow-left text-gray-600"></i>
        </button>
      </div>
      <div class="bg-gradient-to-r from-raio/20 to-yellow-100 rounded-xl h-6 overflow-hidden mb-6 shadow-inner">
        <div id="progressBar" class="bg-gradient-to-r from-ufcg to-ufcg h-full rounded-xl transition-all duration-500"></div>
      </div>
      <div id="motivacao" class="italic text-center text-gray-600 mb-6 p-4 bg-gray-50 rounded-xl font-medium"></div>
      <div id="listaAssuntos" class="grid gap-3"></div>
    </div>

    <!-- CONTEÚDO -->
    <div id="conteudoCard" class="hidden bg-white rounded-2xl shadow-xl p-6 border border-gray-100 animate-slide-up">
      <div class="flex items-center justify-between mb-4">
        <h2 id="tema" class="text-2xl font-bold text-ufcg flex items-center">
          <i class="fas fa-book-open text-raio mr-2"></i>
        </h2>
        <button onclick="if(window.voltarAssuntos) window.voltarAssuntos(); else alert('Sistema ainda carregando...')" class="bg-gray-100 hover:bg-gray-200 p-3 rounded-xl transition-colors">
          <i class="fas fa-arrow-left text-gray-600"></i>
        </button>
      </div>
      <p id="conteudo" class="text-gray-700 leading-relaxed bg-gray-50 p-6 rounded-xl shadow-inner"></p>
      <div class="text-center mt-6">
        <button id="btnExercicio" disabled onclick="if(window.mostrarExercicio) window.mostrarExercicio(); else alert('Sistema ainda carregando...')" class="bg-raio hover:bg-yellow-400 text-black font-bold py-4 px-8 rounded-xl transition-all transform hover:scale-105 shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">
          <i class="fas fa-play mr-2"></i>Ir para exercício
        </button>
      </div>
    </div>

    <!-- EXERCÍCIO -->
    <div id="exercicioCard" class="hidden bg-white rounded-2xl shadow-xl p-6 border border-gray-100 animate-slide-up">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-2xl font-bold text-center flex-1 flex items-center justify-center">
          <i class="fas fa-question-circle text-raio mr-2"></i>Exercício
        </h2>
        <button onclick="if(window.voltarAssuntos) window.voltarAssuntos(); else alert('Sistema ainda carregando...')" class="bg-gray-100 hover:bg-gray-200 p-3 rounded-xl transition-colors">
          <i class="fas fa-arrow-left text-gray-600"></i>
        </button>
      </div>
      <p id="questaoMeta" class="text-center text-sm text-gray-600 mb-4 bg-gray-50 p-3 rounded-xl font-medium"></p>
      <p id="pergunta" class="text-center mb-6 text-lg font-medium bg-blue-50 p-6 rounded-xl shadow-inner"></p>
      <div id="opcoes" class="space-y-3 mb-6"></div>
      <div class="text-center space-y-3">
        <button id="btnConfirmar" onclick="if(window.verificar) window.verificar(); else alert('Sistema ainda carregando...')" class="bg-ufcg hover:bg-ufcg-dark text-white py-4 px-8 rounded-xl font-semibold transition-all transform hover:scale-105 shadow-lg">
          <i class="fas fa-check mr-2"></i>Confirmar resposta
        </button>
        <div id="feedback" class="text-center font-bold mt-4 p-4 rounded-xl"></div>
        <div id="explicacao" class="text-center text-gray-600 mt-2 p-4 bg-gray-50 rounded-xl shadow-inner"></div>
        <button id="proximaQuestaoBtn" class="hidden bg-green-500 hover:bg-green-600 text-white py-3 px-6 rounded-xl font-semibold transition-all transform hover:scale-105 shadow-lg" onclick="if(window.proximaQuestao) window.proximaQuestao(); else alert('Sistema ainda carregando...')">
          <i class="fas fa-arrow-right mr-2"></i>Próxima pergunta
        </button>
        <button id="voltarAssuntosBtn" class="hidden bg-gray-600 hover:bg-gray-700 text-white py-3 px-6 rounded-xl font-semibold transition-all transform hover:scale-105 shadow-lg" onclick="if(window.voltarAssuntos) window.voltarAssuntos(); else alert('Sistema ainda carregando...')">
          <i class="fas fa-home mr-2"></i>Voltar para assuntos
        </button>
      </div>
    </div>
  </div>
</div>

<style>
.disciplinaBtn {
  width: 100%;
  background: linear-gradient(to right, #003366, #2563eb);
  color: white;
  padding: 1rem;
  border-radius: 0.75rem;
  font-weight: 600;
  transition: all;
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
  transform: scale(1);
}
.disciplinaBtn:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
}
.assuntoBtn {
  width: 100%;
  background: #f9fafb;
  padding: 1rem;
  border-radius: 0.75rem;
  text-align: left;
  font-weight: 500;
  transition: all;
  transform: scale(1);
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
  border: 1px solid #e5e7eb;
}
.assuntoBtn:hover {
  background: #f3f4f6;
  transform: scale(1.02);
  box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
}
.opcao {
  background: #f9fafb;
  padding: 1rem;
  border-radius: 0.75rem;
  cursor: pointer;
  transition: all;
  transform: scale(1);
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
  border: 2px solid transparent;
}
.opcao:hover {
  background: #f3f4f6;
  transform: scale(1.02);
  box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
  border-color: #003366;
}
.opcao.selected {
  border-color: #003366;
  background: #eff6ff;
}
</style>

<script type="module" src="main.js"></script>
</body>
</html>
